<div class="container mt-5 pt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">Gestión de Usuarios - CMS</h3>
    </div>
    <div class="card-body">
      
      <div class="row mb-4 border-bottom pb-4">
        <h5>Crear Nuevo Usuario</h5>
        <div class="col-md-4">
          <input type="text" class="form-control" placeholder="Nombre de usuario" [(ngModel)]="nuevoUsuario.usuario">
        </div>
        <div class="col-md-4">
          <input type="password" class="form-control" placeholder="Contraseña" [(ngModel)]="nuevoUsuario.contrasena">
        </div>
        <div class="col-md-2">
          <label class="form-label small fw-bold">Role:</label>
          <select class="form-select" [(ngModel)]="nuevoUsuario.role">
            <option value="user">Usuario</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-success w-100" (click)="registrar()">
            <i class="bi bi-person-plus"></i> Agregar
          </button>
        </div>
      </div>

      <h5>Usuarios Registrados</h5>
      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Usuario</th>
              <th>Role</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let u of usuarios">
              <td>{{ u.idusuario }}</td>
              <td>{{ u.usuario }}</td>
              <td><span class="badge" [ngClass]="u.role === 'admin' ? 'bg-danger' : 'bg-info'">{{ u.role }}</span></td>
              <td>
                <button class="btn btn-sm btn-outline-danger" (click)="eliminar(u.idusuario)">
                  <i class="bi bi-trash"></i> Eliminar
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div *ngIf="cargando" class="text-center">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    </div>
  </div>
</div>
